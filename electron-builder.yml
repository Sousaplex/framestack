appId: com.framestack.app
productName: FrameStack
copyright: Copyright © 2024

directories:
  output: release/${version}
  buildResources: resources

files:
  - dist-electron/**
  - out/renderer/**
  - package.json
  - resources/**

asar: true
asarUnpack:
  - resources/**

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  hardenedRuntime: false  # Disable for unsigned apps
  gatekeeperAssess: false  # Skip Gatekeeper assessment for unsigned apps
  entitlements: null
  entitlementsInherit: null

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png  # Will use PNG if ICO not available
  requestedExecutionLevel: asInvoker

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: resources/icon.png
