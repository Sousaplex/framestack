name: Release

# Builds signed-or-unsigned installers for macOS (universal .dmg/.app) and
# Windows (.msi + .exe) and attaches them to a GitHub Release.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v1.0.3 && git push origin v1.0.3
# ...or run manually from the Actions tab (provide the tag as input).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.3)'
        required: true
        default: 'v1.0.3'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'FrameStack ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            **macOS**: `.dmg` (universal — Apple Silicon + Intel)
            **Windows**: `.msi` or `.exe`

            > Requires **FFmpeg** installed separately and available on your PATH
            > (or set a custom path in the app). See the README.
            >
            > These builds are **not code-signed**. macOS: right-click the app and
            > choose *Open* the first time. Windows: click *More info → Run anyway*
            > on the SmartScreen prompt.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
